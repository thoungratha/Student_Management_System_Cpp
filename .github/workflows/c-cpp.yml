name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # This ensures MinGW is properly configured on the Windows Runner
    - name: Set up GCC
      uses: egor-tensin/setup-gcc@v1
      with:
        platform: x64

    - name: Compile C++ project
      run: g++ Project.cpp -o app.exe

    - name: Run program
      run: .\app.exe
