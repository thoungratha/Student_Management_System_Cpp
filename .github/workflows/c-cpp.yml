name: C++ Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install compiler
      run: sudo apt-get install -y g++

    - name: Compile C++ project
      run: |
        g++ src/main.cpp -o app

    - name: Run program
      run: ./app
