name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # Changed from ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile C++ project
      # Note: Windows uses g++ if available, or you can use shell: cmd
      run: g++ Project.cpp -o app.exe

    - name: Run program
      run: ./app.exe
