name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 10  # Stops the job if it hangs for more than 10 mins

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Compile C++ project
      # -static ensures the .exe can run without needing extra .dll files nearby
      run: g++ Project.cpp -static -o app.exe

    - name: Run program
      shell: cmd
      run: app.exe
